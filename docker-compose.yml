services:
  app:
    build:
      context: ${DEV_BUILD_CONTEXT}/presentation-final-oer-finder-plugin
      dockerfile: Dockerfile
      target: development
    tty: true
    stdin_open: true
    volumes:
      - ./:/home/node/app
      - ${DEV_BUILD_CONTEXT}/presentation-final-oer-finder-plugin/.claude:/home/node/app/.claude